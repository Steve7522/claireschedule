<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女兒生活作息管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. 妳提供的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAxKJzfHeN2c3jD7nGCfUZdgXu5kk2vWd4",
            authDomain: "schedule-3f1fd.firebaseapp.com",
            projectId: "schedule-3f1fd",
            storageBucket: "schedule-3f1fd.firebasestorage.app",
            messagingSenderId: "27220506445",
            appId: "1:27220506445:web:bb5e051f0693b79349a904"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // 妳提供的新 OpenAI Key
        const OPENAI_KEY = "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";

        const dateInput = document.getElementById('datePicker');
        dateInput.valueAsDate = new Date(); // 預設為今天

        // 讀取資料庫
        async function loadSchedule() {
            const date = dateInput.value;
            const docRef = doc(db, "schedules", date);
            const docSnap = await getDoc(docRef);
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '';

            if (docSnap.exists()) {
                docSnap.data().items.forEach(item => addRow(item));
            } else {
                // 預設給一行空白
                addRow({ time: '08:00', task: '起床洗漱', status: '尚未開始', url: '' });
            }
        }

        // 新增一行作息
        window.addRow = function(data = { time: '', task: '', status: '尚未開始', url: '' }) {
            const tbody = document.getElementById('scheduleBody');
            const row = document.createElement('tr');
            row.className = "border-b border-pink-100 hover:bg-pink-50 transition";
            row.innerHTML = `
                <td class="p-3"><input type="time" class="border rounded p-1 w-full time-input" value="${data.time}"></td>
                <td class="p-3"><input type="text" class="border rounded p-1 w-full task-input" value="${data.task}" placeholder="例如：聽英文繪本"></td>
                <td class="p-3">
                    <select class="border rounded p-1 w-full status-input">
                        <option ${data.status === '完美達成' ? 'selected' : ''}>完美達成</option>
                        <option ${data.status === '普通' ? 'selected' : ''}>普通</option>
                        <option ${data.status === '需努力' ? 'selected' : ''}>需努力</option>
                        <option ${data.status === '尚未開始' ? 'selected' : ''}>尚未開始</option>
                    </select>
                </td>
                <td class="p-3">
                    <div class="flex flex-col gap-1">
                        <a href="${data.url}" target="_blank" class="text-blue-500 underline text-xs break-all">${data.url ? '▶️ 播放影片' : ''}</a>
                        <button onclick="getAIResource(this)" class="bg-pink-100 text-pink-600 px-2 py-1 rounded text-xs hover:bg-pink-200 transition">🔍 AI 找影片</button>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        }

        // 儲存至 Firebase (與太太同步)
        window.saveData = async function() {
            const date = dateInput.value;
            const rows = document.querySelectorAll('#scheduleBody tr');
            const items = Array.from(rows).map(row => ({
                time: row.querySelector('.time-input').value,
                task: row.querySelector('.task-input').value,
                status: row.querySelector('.status-input').value,
                url: row.querySelector('a').href || ''
            }));

            try {
                await setDoc(doc(db, "schedules", date), { items });
                alert('✅ 儲存成功！妳跟太太的資料已同步。');
            } catch (e) {
                alert('儲存失敗：' + e.message);
            }
        }

        // AI 找影片邏輯 (加入 Proxy 解決 Failed to fetch)
        window.getAIResource = async function(btn) {
            const taskInput = btn.closest('tr').querySelector('.task-input');
            const taskName = taskInput.value;
            
            if(!taskName) return alert('請先輸入活動內容');
            
            btn.innerText = "搜尋中...";
            btn.disabled = true;

            try {
                // 使用 corsproxy.io 代理繞過瀏覽器限制
                const proxyUrl = 'https://corsproxy.io/?';
                const apiUrl = 'https://api.openai.com/v1/chat/completions';
                
                const response = await fetch(proxyUrl + encodeURIComponent(apiUrl), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENAI_KEY.trim()}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{
                            role: "user", 
                            content: `請幫我找一個適合小孩看的「${taskName}」相關 YouTube 影片連結。請直接給我網址，不要有任何說明。`
                        }],
                        temperature: 0.5
                    })
                });

                const result = await response.json();
                if (result.error) throw new Error(result.error.message);

                const url = result.choices[0].message.content.trim();
                const linkElem = btn.previousElementSibling;
                linkElem.href = url;
                linkElem.innerText = "▶️ 播放影片";
                alert('AI 成功找到影片！記得按儲存喔。');

            } catch (e) {
                console.error(e);
                alert('AI 搜尋失敗：' + e.message);
            } finally {
                btn.innerText = "🔍 AI 找影片";
                btn.disabled = false;
            }
        }

        dateInput.addEventListener('change', loadSchedule);
        window.onload = loadSchedule;
    </script>
    <style>
        .text-stroke {
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 1);
        }
    </style>
</head>
<body class="bg-[#faf0f2] min-h-screen p-4 sm:p-8"> <div class="max-w-4xl mx-auto bg-white p-6 rounded-3xl shadow-2xl border-4 border-pink-200">
        
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-pink-500 mb-2 text-stroke">🌸 女兒成長作息表 🌸</h1>
            <p class="text-pink-400 font-medium italic">與太太共同守護寶貝的每一天</p>
        </header>
        
        <div class="flex flex-col sm:flex-row items-center justify-between mb-8 gap-4">
            <div class="flex flex-col">
                <label class="text-sm text-pink-400 font-bold mb-1 ml-1">選擇日期</label>
                <input type="date" id="datePicker" class="border-2 border-pink-300 rounded-2xl px-5 py-3 focus:ring-4 focus:ring-pink-200 focus:outline-none bg-white text-gray-700 shadow-inner">
            </div>
            <button onclick="addRow()" class="bg-pink-400 text-white px-8 py-3 rounded-2xl hover:bg-pink-500 font-bold shadow-lg transform active:scale-95 transition-all w-full sm:w-auto">
                ＋ 新增作息事項
            </button>
        </div>

        <div class="overflow-x-auto rounded-2xl border-2 border-pink-100 shadow-sm">
            <table class="w-full text-left">
                <thead class="bg-pink-400 text-white">
                    <tr>
                        <th class="p-4 w-24">時間</th>
                        <th class="p-4">活動事項</th>
                        <th class="p-4 w-32">達成率</th>
                        <th class="p-4 w-32">資源連結</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody" class="text-gray-600">
                    </tbody>
            </table>
        </div>

        <div class="mt-10">
            <button onclick="saveData()" class="w-full bg-gradient-to-r from-green-400 to-green-500 text-white py-5 rounded-3xl text-2xl font-black hover:from-green-500 hover:to-green-600 shadow-xl transform active:scale-95 transition-all">
                ☁️ 同步更新 (儲存資料)
            </button>
            <p class="text-center text-gray-400 text-xs mt-4">提示：只要按下儲存，太太端重新整理頁面即可看到同步結果。</p>
        </div>

    </div>
</body>
</html>
