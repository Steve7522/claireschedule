<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女兒成長導師 - 智慧作息版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAxKJzfHeN2c3jD7nGCfUZdgXu5kk2vWd4",
            authDomain: "schedule-3f1fd.firebaseapp.com",
            projectId: "schedule-3f1fd",
            storageBucket: "schedule-3f1fd.firebasestorage.app",
            messagingSenderId: "27220506445",
            appId: "1:27220506445:web:bb5e051f0693b79349a904"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let OPENAI_KEY = localStorage.getItem('user_openai_key');

        function checkKey() {
            if (!OPENAI_KEY) {
                OPENAI_KEY = prompt("請輸入您的 OpenAI API Key：");
                if (OPENAI_KEY) localStorage.setItem('user_openai_key', OPENAI_KEY);
            }
        }

        const dateInput = document.getElementById('datePicker');
        dateInput.valueAsDate = new Date();

        async function loadSchedule() {
            const date = dateInput.value;
            const docRef = doc(db, "schedules", date);
            const docSnap = await getDoc(docRef);
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '';
            if (docSnap.exists()) {
                docSnap.data().items.forEach(item => addRow(item));
            } else {
                addRow({ time: '08:00', task: '起床', status: '尚未開始', url: '' });
            }
        }

        window.addRow = function(data = { time: '', task: '', status: '尚未開始', url: '' }) {
            const tbody = document.getElementById('scheduleBody');
            const row = document.createElement('tr');
            row.className = "border-b border-pink-100 hover:bg-pink-50 transition";
            row.innerHTML = `
                <td class="p-3"><input type="time" class="border rounded-lg p-1 w-full time-input shadow-sm" value="${data.time}"></td>
                <td class="p-3">
                    <input type="text" class="border rounded-lg p-1 w-full task-input shadow-sm mb-1" value="${data.task}">
                    <button onclick="getActivityGuide(this)" class="text-[10px] bg-orange-100 text-orange-600 px-2 py-0.5 rounded-full hover:bg-orange-200 transition">💡 育兒指南</button>
                </td>
                <td class="p-3">
                    <select class="border rounded-lg p-1 w-full status-input shadow-sm text-xs">
                        <option ${data.status === '完美達成' ? 'selected' : ''}>完美達成</option>
                        <option ${data.status === '普通' ? 'selected' : ''}>普通</option>
                        <option ${data.status === '需努力' ? 'selected' : ''}>需努力</option>
                        <option ${data.status === '尚未開始' ? 'selected' : ''}>尚未開始</option>
                    </select>
                </td>
                <td class="p-3 text-center">
                    <div class="flex flex-col items-center gap-1">
                        <a href="${data.url}" target="_blank" class="text-blue-500 font-bold text-[10px] underline ${data.url ? '' : 'hidden'}">▶️ 播放</a>
                        <button onclick="getAIResource(this)" class="bg-pink-100 text-pink-500 px-2 py-1 rounded-full text-[10px] hover:bg-pink-200">AI 找片</button>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        }

        // --- 功能 1：AI 生成活動指南 (互動遊戲、作業) ---
        window.getActivityGuide = async function(btn) {
            checkKey();
            const taskName = btn.previousElementSibling.value;
            if(!taskName) return alert('請先輸入或生成活動內容');

            const guideBox = document.getElementById('guideBox');
            const guideContent = document.getElementById('guideContent');
            guideBox.classList.remove('hidden');
            guideContent.innerHTML = "🧙 AI 正在思考最適合的遊戲與練習...";

            try {
                const proxyUrl = 'https://corsproxy.io/?';
                const apiUrl = 'https://api.openai.com/v1/chat/completions';
                const response = await fetch(proxyUrl + encodeURIComponent(apiUrl), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OPENAI_KEY}` },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{
                            role: "user", 
                            content: `針對活動「${taskName}」，請提供具體的育兒建議：
                            1. 推薦一個簡單的互動遊戲。
                            2. 建議一個可以完成的小作業或練習。
                            3. 家長可以引導孩子的一句話。
                            請用繁體中文，條列式回覆。`
                        }]
                    })
                });
                const result = await response.json();
                guideContent.innerHTML = result.choices[0].message.content.replace(/\n/g, '<br>');
            } catch (e) {
                guideContent.innerHTML = "失敗了：" + e.message;
            }
        }

        // --- 原有功能：生成作息建議 ---
        window.generateDailyPlan = async function(mode) {
            checkKey();
            const btn = event.target;
            btn.innerText = "規劃中...";
            try {
                const proxyUrl = 'https://corsproxy.io/?';
                const apiUrl = 'https://api.openai.com/v1/chat/completions';
                const response = await fetch(proxyUrl + encodeURIComponent(apiUrl), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OPENAI_KEY}` },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{
                            role: "user", 
                            content: `幫我規劃女兒的「${mode}」作息。從08:00到20:00，每2小時一項。格式：時間|活動名稱。不要廢話。`
                        }]
                    })
                });
                const result = await response.json();
                const text = result.choices[0].message.content.trim();
                const tbody = document.getElementById('scheduleBody');
                tbody.innerHTML = '';
                text.split('\n').forEach(line => {
                    const [time, task] = line.split('|');
                    if(time && task) addRow({ time: time.trim(), task: task.trim(), status: '尚未開始', url: '' });
                });
            } catch (e) { alert(e.message); }
            btn.innerText = mode === '雙語生活模式' ? '🎧 雙語生活' : '🧠 邏輯思考';
        }

        // 找 YouTube 片
        window.getAIResource = async function(btn) {
            checkKey();
            const taskName = btn.closest('tr').querySelector('.task-input').value;
            btn.innerText = "...";
            try {
                const proxyUrl = 'https://corsproxy.io/?';
                const apiUrl = 'https://api.openai.com/v1/chat/completions';
                const response = await fetch(proxyUrl + encodeURIComponent(apiUrl), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OPENAI_KEY}` },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{role: "user", content: `給一個關於「${taskName}」的YouTube連結。只給網址。`}]
                    })
                });
                const result = await response.json();
                const urlMatch = result.choices[0].message.content.match(/https?:\/\/[^\s]+/);
                if (urlMatch) {
                    const linkElem = btn.parentElement.querySelector('a');
                    linkElem.href = urlMatch[0];
                    linkElem.innerText = "▶️ 播放";
                    linkElem.classList.remove('hidden');
                }
            } catch (e) {}
            btn.innerText = "AI 找片";
        }

        window.saveData = async function() {
            const date = dateInput.value;
            const rows = document.querySelectorAll('#scheduleBody tr');
            const items = Array.from(rows).map(row => ({
                time: row.querySelector('.time-input').value,
                task: row.querySelector('.task-input').value,
                status: row.querySelector('.status-input').value,
                url: row.querySelector('a').href
            }));
            await setDoc(doc(db, "schedules", date), { items });
            alert('儲存成功！');
        }

        dateInput.addEventListener('change', loadSchedule);
        window.onload = loadSchedule;
    </script>
</head>
<body class="bg-pink-50 min-h-screen p-4 pb-20">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-[2.5rem] shadow-2xl border-4 border-pink-200">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-black text-pink-500 mb-4">🌸 女兒成長管家 v3.0</h1>
            <div class="flex justify-center gap-2">
                <button onclick="generateDailyPlan('雙語生活模式')" class="bg-blue-400 text-white px-4 py-2 rounded-full text-xs font-bold hover:bg-blue-500 shadow-md transition">🎧 雙語生活</button>
                <button onclick="generateDailyPlan('邏輯思考模式')" class="bg-purple-400 text-white px-4 py-2 rounded-full text-xs font-bold hover:bg-purple-500 shadow-md transition">🧠 邏輯思考</button>
            </div>
        </header>

        <div id="guideBox" class="hidden mb-6 p-4 bg-orange-50 border-2 border-orange-200 rounded-2xl relative">
            <button onclick="document.getElementById('guideBox').classList.add('hidden')" class="absolute top-2 right-3 text-orange-400 font-bold">✕</button>
            <h3 class="font-bold text-orange-600 mb-2 flex items-center">✨ AI 育兒指南：</h3>
            <div id="guideContent" class="text-xs text-gray-700 leading-relaxed"></div>
        </div>
        
        <div class="flex items-center justify-between mb-4 gap-4">
            <input type="date" id="datePicker" class="border-2 border-pink-100 rounded-xl px-3 py-2 text-sm">
            <div class="flex gap-1">
                <button onclick="addRow()" class="bg-pink-300 text-white px-3 py-2 rounded-xl text-xs font-bold">＋新增</button>
                <button onclick="saveData()" class="bg-green-500 text-white px-3 py-2 rounded-xl text-xs font-bold shadow-md">💾 儲存</button>
            </div>
        </div>

        <div class="overflow-hidden rounded-2xl border border-pink-100 bg-white">
            <table class="w-full text-left">
                <thead class="bg-pink-400 text-white text-[10px] uppercase">
                    <tr>
                        <th class="p-3 w-24">時間</th>
                        <th class="p-3">活動與建議</th>
                        <th class="p-3 w-28">達成</th>
                        <th class="p-3 w-20 text-center">影片</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody" class="text-xs"></tbody>
            </table>
        </div>
    </div>
</body>
</html>
