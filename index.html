<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿勇教學計劃導師 v7.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAxKJzfHeN2c3jD7nGCfUZdgXu5kk2vWd4",
            authDomain: "schedule-3f1fd.firebaseapp.com",
            projectId: "schedule-3f1fd",
            storageBucket: "schedule-3f1fd.firebasestorage.app",
            messagingSenderId: "27220506445",
            appId: "1:27220506445:web:bb5e051f0693b79349a904"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let OPENAI_KEY = localStorage.getItem('user_openai_key');

        function checkKey() {
            if (!OPENAI_KEY) {
                OPENAI_KEY = prompt("請輸入您的 OpenAI API Key (sk-...)：");
                if (OPENAI_KEY) localStorage.setItem('user_openai_key', OPENAI_KEY.trim());
            }
        }

        const dateInput = document.getElementById('datePicker');
        const ageSelect = document.getElementById('ageSelect');
        dateInput.valueAsDate = new Date();

        async function loadSchedule() {
            const date = dateInput.value;
            const docRef = doc(db, "schedules", date);
            const docSnap = await getDoc(docRef);
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = '';
            if (docSnap.exists()) {
                const items = docSnap.data().items;
                items.sort((a, b) => a.time.localeCompare(b.time));
                items.forEach(item => addRow(item));
            } else {
                parseAndShowDailyFromCache();
            }
        }

        // 手機版卡片設計
        window.addRow = function(data = { time: '', task: '', status: '尚未開始', url: '', books: [] }) {
            const container = document.getElementById('scheduleContainer');
            const card = document.createElement('div');
            card.className = "bg-white p-5 rounded-[2rem] mb-4 shadow-sm border border-pink-100 flex flex-col gap-3 relative";
            
            const booksHtml = (data.books || []).map(book => 
                `<button onclick="searchBookOnYoutube('${book}')" class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-xl border border-blue-100 text-[11px] font-bold">📖 ${book}</button>`
            ).join(' ');

            card.innerHTML = `
                <div class="flex items-center justify-between gap-3">
                    <input type="time" class="time-input border-2 border-pink-50 rounded-xl px-3 py-2 text-sm font-black text-pink-500 bg-pink-50/30" value="${data.time}">
                    <select class="status-input border-2 border-pink-50 rounded-xl px-3 py-2 text-xs bg-white text-gray-500 font-bold grow">
                        <option ${data.status === '完美達成' ? 'selected' : ''}>完美達成</option>
                        <option ${data.status === '普通' ? 'selected' : ''}>普通</option>
                        <option ${data.status === '需努力' ? 'selected' : ''}>需努力</option>
                        <option ${data.status === '尚未開始' ? 'selected' : ''}>尚未開始</option>
                    </select>
                </div>
                <div class="mt-1">
                    <input type="text" class="task-input w-full border-b-2 border-pink-100 focus:border-pink-300 outline-none py-2 text-base font-bold text-gray-700 placeholder-gray-300" value="${data.task}" placeholder="輸入活動名稱...">
                </div>
                <div class="book-container flex flex-wrap gap-2">${booksHtml}</div>
                <div class="flex items-center justify-between mt-2 pt-2 border-t border-gray-50">
                    <div class="flex gap-2">
                        <button onclick="getActivityGuide(this)" class="bg-orange-100 text-orange-600 px-4 py-2 rounded-full text-xs font-black hover:bg-orange-200 transition">💡 指南 & 書單</button>
                        <button onclick="getAIResource(this)" class="bg-pink-100 text-pink-500 px-4 py-2 rounded-full text-xs font-black hover:bg-pink-200 transition">AI 找片</button>
                    </div>
                    <a href="${data.url}" target="_blank" class="text-blue-500 font-bold text-xs underline decoration-2 ${data.url && data.url.includes('http') ? '' : 'hidden'}">▶️ 播放</a>
                </div>
                <button onclick="if(confirm('確定刪除？')) this.parentElement.remove()" class="absolute -top-1 -right-1 bg-gray-200 text-white w-6 h-6 rounded-full text-[10px] hover:bg-red-400 transition">✕</button>
            `;
            container.appendChild(card);
        };

        window.searchBookOnYoutube = function(bookName) {
            const age = ageSelect.value;
            window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(age + ' ' + bookName)}`, '_blank');
        };

        window.getActivityGuide = async function(btn) {
            checkKey();
            const card = btn.closest('div').parentElement.parentElement;
            const taskName = card.querySelector('.task-input').value;
            const bookContainer = card.querySelector('.book-container');
            const guideBox = document.getElementById('guideBox');
            const guideContent = document.getElementById('guideContent');
            
            guideBox.classList.remove('hidden');
            guideContent.innerHTML = `🧙 AI 正在為 ${ageSelect.value} 孩子準備內容...`;

            try {
                const proxyUrl = 'https://corsproxy.io/?';
                const apiUrl = 'https://api.openai.com/v1/chat/completions';
                const response = await fetch(proxyUrl + encodeURIComponent(apiUrl), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OPENAI_KEY}` },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{ role: "user", content: `針對 ${ageSelect.value} 孩子進行「${taskName}」：1.互動遊戲 2.練習任務 3.推薦三本具體書名(用《》包起來)。` }]
                    })
                });
                const result = await response.json();
                const content = result.choices[0].message.content;
                guideContent.innerHTML = content.replace(/\n/g, '<br>');
                
                const bookMatches = content.match(/《([^》]+)》/g);
                if (bookMatches) {
                    bookContainer.innerHTML = '';
                    bookMatches.forEach(full => {
                        const name = full.replace(/[《》]/g, '');
                        const b = document.createElement('button');
                        b.className = "bg-blue-50 text-blue-600 px-3 py-1.5 rounded-xl border border-blue-100 text-[11px] font-bold";
                        b.innerHTML = `📖 ${name}`;
                        b.onclick = () => searchBookOnYoutube(name);
                        bookContainer.appendChild(b);
                    });
                }
            } catch (e) { guideContent.innerHTML = "讀取指南失敗，請檢查 Key。"; }
        };

        window.getAIResource = async function(btn) {
            checkKey();
            const card = btn.closest('div').parentElement.parentElement;
            const taskName = card.querySelector('.task-input').value;
            const age = ageSelect.value;
            btn.innerText = "⏳";
            try {
                const proxyUrl = 'https://corsproxy.io/?';
                const apiUrl = 'https://api.openai.com/v1/chat/completions';
                const response = await fetch(proxyUrl + encodeURIComponent(apiUrl), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OPENAI_KEY}` },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{ role: "user", content: `提供一個 ${age} 小孩關於「${taskName}」的 YouTube 連結。只給網址。` }]
                    })
                });
                const result = await response.json();
                const urlMatch = result.choices[0].message.content.match(/https?:\/\/[^\s]+/);
                const linkElem = card.querySelector('a');
                linkElem.href = urlMatch ? urlMatch[0] : `https://www.youtube.com/results?search_query=${encodeURIComponent(age + ' ' + taskName)}`;
                linkElem.innerText = "▶️ 播放影片";
                linkElem.classList.remove('hidden');
            } catch (e) {
                card.querySelector('a').href = `https://www.youtube.com/results?search_query=${encodeURIComponent(age + ' ' + taskName)}`;
                card.querySelector('a').classList.remove('hidden');
            }
            btn.innerText = "AI 找片";
        };

        window.saveData = async function() {
            const date = dateInput.value;
            const cards = document.querySelectorAll('.bg-white.p-5');
            const items = Array.from(cards).map(card => {
                const bBtns = card.querySelectorAll('.book-container button');
                return {
                    time: card.querySelector('.time-input').value,
                    task: card.querySelector('.task-input').value,
                    status: card.querySelector('.status-input').value,
                    url: card.querySelector('a').href,
                    books: Array.from(bBtns).map(b => b.innerText.replace('📖 ', ''))
                };
            }).filter(i => i.task);
            await setDoc(doc(db, "schedules", date), { items });
            alert('🌸 儲存成功！');
        };

        window.generateDailyPlan = async function(mode) {
            checkKey();
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "規劃中...";
            try {
                const proxyUrl = 'https://corsproxy.io/?';
                const apiUrl = 'https://api.openai.com/v1/chat/completions';
                const response = await fetch(proxyUrl + encodeURIComponent(apiUrl), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OPENAI_KEY}` },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{ role: "user", content: `規劃 ${ageSelect.value} 孩子「${mode}」行程。格式：時間|活動。不要廢話。` }]
                    })
                });
                const result = await response.json();
                result.choices[0].message.content.trim().split('\n').forEach(line => {
                    const [time, task] = line.split('|');
                    if(time && task) addRow({ time: time.trim(), task: task.trim(), status: '尚未開始', url: '', books: [] });
                });
            } catch (e) { alert(e.message); }
            btn.innerText = originalText;
        };

        function parseAndShowDailyFromCache() {
            const cache = localStorage.getItem('weekly_plan_cache');
            if(!cache) { addRow({ time: '09:00', task: '', status: '尚未開始', url: '', books: [] }); return; }
            const dateObj = new Date(dateInput.value);
            const weekDays = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
            const line = cache.split('\n').find(l => l.includes(weekDays[dateObj.getDay()]));
            if(line) {
                const p = line.split('|');
                for(let i=1; i<p.length; i+=2) addRow({ time: p[i], task: p[i+1], status: '尚未開始', url: '', books: [] });
            }
        }

        dateInput.addEventListener('change', loadSchedule);
        window.onload = loadSchedule;
    </script>
</head>
<body class="bg-[#FFF5F7] min-h-screen p-4 pb-28 font-sans">
    <div class="max-w-xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-black text-pink-500 mb-4 tracking-tight">🌸 女兒成長管家 v7.5</h1>
            
            <div class="flex flex-col gap-3">
                <div class="flex justify-center gap-2">
                    <div class="bg-white px-3 py-2 rounded-2xl shadow-sm border border-pink-100 flex items-center grow justify-center">
                        <label class="text-pink-400 font-bold text-xs mr-1">年齡:</label>
                        <select id="ageSelect" class="bg-transparent border-none text-xs text-pink-500 font-black focus:ring-0">
                            <option value="1歲">1歲</option><option value="2歲">2歲</option>
                            <option value="3歲" selected>3歲</option><option value="4歲">4歲</option>
                            <option value="5歲">5歲</option><option value="6歲+">6歲+</option>
                        </select>
                    </div>
                    <input type="date" id="datePicker" class="bg-white px-3 py-2 rounded-2xl shadow-sm border border-pink-100 text-xs text-gray-500 focus:outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="generateDailyPlan('雙語生活')" class="bg-blue-400 text-white py-3 rounded-2xl text-xs font-black shadow-md active:scale-95 transition">🎧 建議雙語</button>
                    <button onclick="generateDailyPlan('邏輯思考')" class="bg-purple-400 text-white py-3 rounded-2xl text-xs font-black shadow-md active:scale-95 transition">🧠 建議邏輯</button>
                </div>
            </div>
        </header>

        <div id="guideBox" class="hidden mb-6 p-5 bg-orange-50 border-2 border-orange-100 rounded-3xl relative shadow-sm">
            <button onclick="document.getElementById('guideBox').classList.add('hidden')" class="absolute top-4 right-5 text-orange-300 font-black">✕</button>
            <h3 class="font-bold text-orange-600 mb-2 text-xs italic">✨ AI 育兒導引內容</h3>
            <div id="guideContent" class="text-[11px] text-gray-700 leading-relaxed space-y-2"></div>
        </div>
        
        <div id="scheduleContainer">
            </div>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-lg border-t border-pink-100 flex gap-3 max-w-xl mx-auto shadow-lg z-50">
            <button onclick="addRow()" class="bg-pink-100 text-pink-500 px-6 py-4 rounded-3xl font-black text-sm grow active:scale-95 transition">＋ 新增</button>
            <button onclick="saveData()" class="bg-green-500 text-white px-10 py-4 rounded-3xl font-black text-sm shadow-xl grow-[2] active:scale-95 transition">💾 儲存本日</button>
        </div>
    </div>
</body>
</html>
