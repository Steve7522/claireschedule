<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女兒生活作息表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. 妳提供的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAxKJzfHeN2c3jD7nGCfUZdgXu5kk2vWd4",
            authDomain: "schedule-3f1fd.firebaseapp.com",
            projectId: "schedule-3f1fd",
            storageBucket: "schedule-3f1fd.firebasestorage.app",
            messagingSenderId: "27220506445",
            appId: "1:27220506445:web:bb5e051f0693b79349a904"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const OPENAI_KEY = "sk-proj-EH7L...LIMA"; // 建議將 Key 放在後端，此為示範

        // 初始化日期：預設為今天
        const dateInput = document.getElementById('datePicker');
        dateInput.valueAsDate = new Date();

        // 讀取資料
        async function loadSchedule() {
            const date = dateInput.value;
            const docRef = doc(db, "schedules", date);
            const docSnap = await getDoc(docRef);

            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '';

            if (docSnap.exists()) {
                docSnap.data().items.forEach((item, index) => addRow(item));
            } else {
                // 預設空白行
                addRow({ time: '08:00', task: '起床', status: '尚未開始', url: '' });
            }
        }

        // 新增一行表格
        window.addRow = function(data = { time: '', task: '', status: '尚未開始', url: '' }) {
            const tbody = document.getElementById('scheduleBody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="p-2"><input type="time" class="border p-1 w-full time-input" value="${data.time}"></td>
                <td class="p-2"><input type="text" class="border p-1 w-full task-input" value="${data.task}"></td>
                <td class="p-2">
                    <select class="border p-1 w-full status-input">
                        <option ${data.status === '完美達成' ? 'selected' : ''}>完美達成</option>
                        <option ${data.status === '普通' ? 'selected' : ''}>普通</option>
                        <option ${data.status === '需努力' ? 'selected' : ''}>需努力</option>
                        <option ${data.status === '尚未開始' ? 'selected' : ''}>尚未開始</option>
                    </select>
                </td>
                <td class="p-2">
                    <a href="${data.url}" target="_blank" class="text-blue-500 underline text-sm">${data.url ? '查看影片' : ''}</a>
                    <button onclick="getAIResource(this)" class="bg-gray-100 px-2 py-1 rounded text-xs ml-2 hover:bg-gray-200">🔍 AI 找影片</button>
                </td>
            `;
            tbody.appendChild(row);
        }

        // 儲存資料到 Firebase
        window.saveData = async function() {
            const date = dateInput.value;
            const rows = document.querySelectorAll('#scheduleBody tr');
            const items = Array.from(rows).map(row => ({
                time: row.querySelector('.time-input').value,
                task: row.querySelector('.task-input').value,
                status: row.querySelector('.status-input').value,
                url: row.querySelector('a').href || ''
            }));

            await setDoc(doc(db, "schedules", date), { items });
            alert('儲存成功！太太重新整理頁面即可看到。');
        }

        // 呼叫 OpenAI 找 YouTube 連結
        window.getAIResource = async function(btn) {
            const taskName = btn.parentElement.parentElement.querySelector('.task-input').value;
            if(!taskName) return alert('請先輸入活動內容');
            
            btn.innerText = "搜尋中...";
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENAI_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{role: "user", content: `請幫我找一個關於「${taskName}」的 YouTube 學習影片連結，只要給我網址就好，不要廢話。`}]
                    })
                });
                const data = await response.json();
                const url = data.choices[0].message.content.trim();
                btn.previousElementSibling.href = url;
                btn.previousElementSibling.innerText = "查看影片";
            } catch (e) {
                alert('AI 搜尋失敗，請檢查 Key 是否正確');
            }
            btn.innerText = "🔍 AI 找影片";
        }

        dateInput.addEventListener('change', loadSchedule);
        window.onload = loadSchedule;
    </script>
</head>
<body class="bg-pink-50 p-5">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">🌸 女兒生活作息管理</h1>
        
        <div class="flex items-center justify-between mb-6">
            <input type="date" id="datePicker" class="text-lg border-2 border-pink-200 rounded-lg px-4 py-2 focus:outline-none focus:border-pink-500">
            <button onclick="addRow()" class="bg-pink-500 text-white px-4 py-2 rounded-lg hover:bg-pink-600 shadow-md">＋ 新增事項</button>
        </div>

        <table class="w-full border-collapse">
            <thead>
                <tr class="bg-pink-100">
                    <th class="p-3 text-left">時間</th>
                    <th class="p-3 text-left">活動內容</th>
                    <th class="p-3 text-left">達成率</th>
                    <th class="p-3 text-left">AI 推薦資源</th>
                </tr>
            </thead>
            <tbody id="scheduleBody">
                </tbody>
        </table>

        <div class="mt-8 flex justify-center">
            <button onclick="saveData()" class="bg-green-500 text-white px-10 py-3 rounded-full text-lg font-bold hover:bg-green-600 shadow-xl transition-all">
                ✅ 儲存今日作息 (同步給太太)
            </button>
        </div>
    </div>
</body>
</html>
