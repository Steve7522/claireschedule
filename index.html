<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女兒生活作息表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAxKJzfHeN2c3jD7nGCfUZdgXu5kk2vWd4",
            authDomain: "schedule-3f1fd.firebaseapp.com",
            projectId: "schedule-3f1fd",
            storageBucket: "schedule-3f1fd.firebasestorage.app",
            messagingSenderId: "27220506445",
            appId: "1:27220506445:web:bb5e051f0693b79349a904"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // 妳提供的 OpenAI Key
        const OPENAI_KEY = "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";

        const dateInput = document.getElementById('datePicker');
        dateInput.valueAsDate = new Date();

        // 讀取當天資料
        async function loadSchedule() {
            const date = dateInput.value;
            const docRef = doc(db, "schedules", date);
            const docSnap = await getDoc(docRef);
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '';

            if (docSnap.exists()) {
                docSnap.data().items.forEach(item => addRow(item));
            } else {
                addRow({ time: '08:00', task: '起床', status: '尚未開始', url: '' });
            }
        }

        window.addRow = function(data = { time: '', task: '', status: '尚未開始', url: '' }) {
            const tbody = document.getElementById('scheduleBody');
            const row = document.createElement('tr');
            row.className = "border-b hover:bg-gray-50";
            row.innerHTML = `
                <td class="p-2"><input type="time" class="border p-1 w-full time-input" value="${data.time}"></td>
                <td class="p-2"><input type="text" class="border p-1 w-full task-input" value="${data.task}"></td>
                <td class="p-2">
                    <select class="border p-1 w-full status-input">
                        <option ${data.status === '完美達成' ? 'selected' : ''}>完美達成</option>
                        <option ${data.status === '普通' ? 'selected' : ''}>普通</option>
                        <option ${data.status === '需努力' ? 'selected' : ''}>需努力</option>
                        <option ${data.status === '尚未開始' ? 'selected' : ''}>尚未開始</option>
                    </select>
                </td>
                <td class="p-2">
                    <div class="flex items-center gap-2">
                        <a href="${data.url}" target="_blank" class="text-blue-500 underline text-xs break-all">${data.url ? '點我播放' : ''}</a>
                        <button onclick="getAIResource(this)" class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs whitespace-nowrap hover:bg-blue-200 transition">AI 找影片</button>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        }

        window.saveData = async function() {
            const date = dateInput.value;
            const rows = document.querySelectorAll('#scheduleBody tr');
            const items = Array.from(rows).map(row => ({
                time: row.querySelector('.time-input').value,
                task: row.querySelector('.task-input').value,
                status: row.querySelector('.status-input').value,
                url: row.querySelector('a').href || ''
            }));

            try {
                await setDoc(doc(db, "schedules", date), { items });
                alert('💾 已儲存！太太重新整理頁面後即可看到最新狀態。');
            } catch (error) {
                alert('儲存失敗：' + error.message);
            }
        }

        window.getAIResource = async function(btn) {
            const taskInput = btn.parentElement.parentElement.parentElement.querySelector('.task-input');
            const taskName = taskInput.value;
            
            if(!taskName) return alert('請先輸入活動內容');
            
            btn.innerText = "搜尋中...";
            btn.disabled = true;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENAI_KEY.trim()}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{
                            role: "user", 
                            content: `請幫我找一個適合小孩看的「${taskName}」相關 YouTube 影片連結。請「只給網址」，不要有任何其他文字。`
                        }],
                        temperature: 0.5
                    })
                });

                const result = await response.json();

                if (result.error) {
                    throw new Error(result.error.message);
                }

                const url = result.choices[0].message.content.trim();
                const linkElem = btn.previousElementSibling;
                linkElem.href = url;
                linkElem.innerText = "點我播放";
                alert('成功找到建議影片！別忘了按儲存按鈕喔。');

            } catch (e) {
                console.error(e);
                alert('AI 搜尋失敗：' + e.message);
            } finally {
                btn.innerText = "AI 找影片";
                btn.disabled = false;
            }
        }

        dateInput.addEventListener('change', loadSchedule);
        window.onload = loadSchedule;
    </script>
</head>
<body class="bg-orange-50 min-h-screen p-4">
    <div class="max-w-3xl mx-auto bg-white p-6 rounded-2xl shadow-xl border border-orange-100">
        <h1 class="text-3xl font-extrabold text-orange-600 mb-2 text-center text-stroke">👧 寶貝成長作息表</h1>
        <p class="text-center text-gray-500 mb-6 text-sm">今日事今日畢，累積每個小驚喜</p>
        
        <div class="flex items-center justify-between mb-6 gap-4">
            <input type="date" id="datePicker" class="border-2 border-orange-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-orange-400 focus:outline-none bg-white">
            <button onclick="addRow()" class="bg-orange-500 text-white px-6 py-2 rounded-xl hover:bg-orange-600 font-bold shadow-md transform active:scale-95 transition">＋ 新增行程</button>
        </div>

        <div class="overflow-hidden rounded-xl border border-gray-200">
            <table class="w-full">
                <thead class="bg-orange-500 text-white text-sm">
                    <tr>
                        <th class="p-3 text-left w-1/5">時間</th>
                        <th class="p-3 text-left w-2/5">活動項目</th>
                        <th class="p-3 text-left w-1/5">狀態</th>
                        <th class="p-3 text-left w-1/5">資源</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody">
                    </tbody>
            </table>
        </div>

        <div class="mt-8 flex flex-col gap-3">
            <button onclick="saveData()" class="w-full bg-green-500 text-white py-4 rounded-2xl text-xl font-black hover:bg-green-600 shadow-lg transform active:scale-95 transition">
                🚀 同步更新資料給太太
            </button>
            <p class="text-center text-xs text-gray-400 italic">資料將自動儲存至 Firebase 雲端資料庫</p>
        </div>
    </div>
</body>
</html>
